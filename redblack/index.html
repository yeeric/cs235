<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red-Black Tree Visualizer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <h1>Red-Black Tree Visualizer</h1>
        <p>
          Explore how insertion and deletion rebalance a red-black tree through
          rotations and recoloring.
        </p>
      </header>

      <section class="controls" aria-label="Tree controls">
        <div class="control-group">
          <label for="valueInput">Value</label>
          <input id="valueInput" type="number" placeholder="e.g. 42" />
          <button id="insertBtn">Insert</button>
          <button id="deleteBtn" class="danger">Delete</button>
        </div>

        <div class="control-group">
          <button id="demoBtn">Run Demo Sequence</button>
          <button id="clearBtn" class="secondary">Clear Tree</button>
        </div>

        <div class="control-group">
          <button id="prevBtn" class="secondary">Previous</button>
          <button id="playBtn">Play</button>
          <button id="nextBtn" class="secondary">Next</button>
        </div>
      </section>

      <section class="status" aria-live="polite">
        <p id="statusLine">Ready. Insert or delete a value to begin.</p>
        <p id="stepCounter">Step 0 / 0</p>
      </section>

      <main class="workspace">
        <section class="tree-panel" aria-label="Tree diagram">
          <svg id="treeSvg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet"></svg>
        </section>

        <aside class="code-panel" aria-label="Python logic and step log">
          <h2>Python Logic</h2>
          <p id="codeHint">Highlighted lines will match the current visualization step.</p>
          <pre id="pythonCode" class="python-code"></pre>

          <section class="step-log-section" aria-label="Step log">
            <h3>Step Log</h3>
            <ol id="stepLog"></ol>
          </section>
        </aside>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
